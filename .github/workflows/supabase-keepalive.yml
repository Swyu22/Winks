name: Supabase Keepalive

# Free-tier Supabase projects pause after 7 days of inactivity.
# This workflow makes a minimal REST call every 6 days (and on demand)
# to keep the project active.

on:
  schedule:
    # Day-of-month every 6: fires on 1, 7, 13, 19, 25, 31 — max gap 6 days.
    - cron: '0 12 */6 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing repo secrets VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY"
            exit 1
          fi
          status=$(curl -sS -o /tmp/resp -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/links?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "HTTP $status"
          if [ "$status" != "200" ]; then
            echo "::error::Keepalive ping failed (HTTP $status)"
            cat /tmp/resp || true
            exit 1
          fi
          echo "Supabase responded OK"
