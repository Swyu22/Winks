name: Supabase Keepalive

# Free-tier Supabase projects pause after 7 days of inactivity.
# This workflow makes a minimal REST call every 3 days (and on demand)
# to keep the project active, leaving a comfortable margin so one missed
# run can't let the project pause (which adds cold-start latency to the
# first page load).

on:
  schedule:
    # Day-of-month every 3: fires on 1, 4, 7, ..., 28, 31 — max gap 3 days.
    - cron: '0 12 */3 * *'
  workflow_dispatch:

# Least privilege: this workflow only makes an outbound curl and needs no GITHUB_TOKEN scopes.
permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Missing repo secrets VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY"
            exit 1
          fi
          status=$(curl -sS --connect-timeout 10 --max-time 30 --retry 2 \
            -o /tmp/resp -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/links?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "HTTP $status"
          if [ "$status" != "200" ]; then
            echo "::error::Keepalive ping failed (HTTP $status)"
            cat /tmp/resp || true
            exit 1
          fi
          echo "Supabase responded OK"
